  <meta charset="UTF-8">

  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      background-color: #000;
    }
    
    #app-container {
      width: 100%;
      max-width: 414px; /* iPhone Max width */
      height: 100vh;
      position: relative;
    }

    @media (min-width: 769px) {
      #app-container {
        margin: 20px auto;
        height: calc(100vh - 40px);
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.5);
      }
    }
    
    /* Mobile view: full width, no constraints */
    @media (max-width: 768px) {
      #app-container {
        max-width: 100%;
        height: 100vh;
        border-radius: 0;
        box-shadow: none;
      }
    }
  </style>

<body>
  <div id="app-container">
